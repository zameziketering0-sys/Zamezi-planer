function linePrice(item,qty,grams){
  const q=Number(qty)||1;
  if(item&&item.type==="kilogramski"){const kg=(Number(grams)||1000)/1000;return Math.round((item.price||0)*kg*q);}
  return(item?(item.price||0):0)*q;
}
const iSt=(extra={})=>({width:"100%",padding:"8px 10px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,background:C.surface,color:C.text,boxSizing:"border-box",outline:"none",fontFamily:FA,...extra});
const e=(tag,props,...kids)=>h(tag,props,...kids);

// ── PDF ───────────────────────────────────────────────────────────────────────
function PrintDay({orders,date,onClose}){
  const sorted=[...orders.filter(o=>o.datum===date)].sort((a,b)=>a.vreme.localeCompare(b.vreme));
  const [loading,setLoading]=useState(false);
  const [pdfUrl,setPdfUrl]=useState(null);
  const generate=()=>{
    setLoading(true);
    try{
      const{jsPDF}=window.jspdf;
      const doc=new jsPDF({unit:"mm",format:"a4"});
      const ML=14,PW=210,CW=182;let y=14;
      const chk=n=>{if(y+n>277){doc.addPage();y=14;}};
      doc.setFontSize(22);doc.setFont("helvetica","bold");doc.setTextColor(160,0,28);doc.text("ZAMEZI",ML,y);
      doc.setFontSize(11);doc.setFont("helvetica","italic");doc.setTextColor(150,150,150);doc.text("ketering",ML,y+6);
      doc.setFontSize(14);doc.setFont("helvetica","bold");doc.setTextColor(50,50,50);doc.text(date,PW-ML,y,{align:"right"});
      doc.setFontSize(10);doc.setFont("helvetica","normal");doc.setTextColor(150,150,150);doc.text(sorted.length+" porudzbina",PW-ML,y+6,{align:"right"});
      y+=12;doc.setDrawColor(160,0,28);doc.setLineWidth(0.6);doc.line(ML,y,PW-ML,y);y+=8;
      sorted.forEach((o,oi)=>{
        const sc=safeCart(o.cart);chk(20+sc.length*8);
        doc.setFontSize(17);doc.setFont("helvetica","bold");doc.setTextColor(160,0,28);
        doc.text(o.vreme+"  "+o.ime+" "+(o.prezime||""),ML,y);
        doc.text(Number(o.ukupno||0).toLocaleString("sr-RS")+" RSD",PW-ML,y,{align:"right"});
        y+=5;
        doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(100,100,100);
        const sub=["Tel: "+(o.telefon||""),o.kanal||"",o.dostava!==false?"Dostava: "+(o.adresa||"-"):"Preuzimanje",o.izmene?"Izmene: "+o.izmene:"",o.napomene||""].filter(Boolean).join(" · ");
        const sl=doc.splitTextToSize(sub,CW);doc.text(sl,ML,y);y+=sl.length*4+3;
        sc.forEach(c=>{chk(9);const lp=linePrice(c,c.qty,c.grams);
          doc.setFontSize(13);doc.setFont("helvetica","bold");doc.setTextColor(20,20,20);
          doc.text(c.qty+"x  "+c.name+(c.type==="kilogramski"?" ("+(c.grams||1000)+"g)":""),ML+2,y);
          doc.setTextColor(160,0,28);doc.text(lp.toLocaleString("sr-RS")+" RSD",PW-ML,y,{align:"right"});
          doc.setDrawColor(220,220,220);doc.setLineWidth(0.2);doc.line(ML+2,y+1.5,PW-ML,y+1.5);y+=7;
        });
        if(oi<sorted.length-1){y+=3;chk(6);doc.setDrawColor(200,200,200);doc.setLineWidth(0.3);doc.setLineDash([2,2]);doc.line(ML,y,PW-ML,y);doc.setLineDash([]);y+=6;}
      });
      const blob=doc.output("blob");setPdfUrl({url:URL.createObjectURL(blob),fname:"zamezi-"+date+".pdf"});
    }catch(err){alert("Greška: "+err.message);}
    setLoading(false);
  };
  return h("div",{style:{position:"fixed",inset:0,background:"#0009",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{background:"#fff",borderRadius:18,padding:26,width:"min(500px,97vw)",boxShadow:`0 20px 60px ${C.shadow}`}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
        h("h2",{style:{margin:0,fontSize:17,color:C.crimson,fontFamily:FS}},"📄 PDF — "+date),
        h("button",{onClick:onClose,style:{background:"none",border:"none",fontSize:22,cursor:"pointer"}},"✕")),
      sorted.length===0?h("p",{style:{color:"#888",textAlign:"center",padding:"30px 0"}},"Nema porudžbina."):h(Fragment,null,
        h("div",{style:{marginBottom:18}},sorted.map((o,i)=>
          h("div",{key:o.id,style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<sorted.length-1?`1px solid ${C.border}`:"none"}},
            h("span",{style:{fontWeight:800,color:C.crimson,minWidth:48}},o.vreme),
            h("span",{style:{fontWeight:600,flex:1,paddingLeft:8}},o.ime+" "+(o.prezime||"")),
            h("span",{style:{fontWeight:700,color:C.crimson}},Number(o.ukupno||0).toLocaleString("sr-RS")+" RSD")))),
        !pdfUrl&&h("button",{onClick:generate,disabled:loading,style:{width:"100%",padding:"13px 0",borderRadius:11,border:"none",background:loading?"#ccc":C.crimson,color:"#fff",cursor:loading?"default":"pointer",fontWeight:800,fontSize:15}},loading?"⏳ Generišem PDF...":"📄 Napravi PDF"),
        pdfUrl&&h("div",null,
          h("div",{style:{background:"#EAF5EE",border:"1px solid #2D7A4F",borderRadius:10,padding:"12px 16px",marginBottom:14,color:C.green,fontWeight:700,fontSize:14,textAlign:"center"}},"✅ PDF spreman!"),
          h("a",{href:pdfUrl.url,download:pdfUrl.fname,style:{display:"block",width:"100%",padding:"13px 0",borderRadius:11,background:C.crimson,color:"#fff",fontWeight:800,fontSize:15,textDecoration:"none",textAlign:"center",boxSizing:"border-box"}},"⬇️ Preuzmi "+pdfUrl.fname),
          h("button",{onClick:()=>setPdfUrl(null),style:{marginTop:10,width:"100%",padding:"9px 0",borderRadius:10,border:`1px solid ${C.border}`,background:"#fff",cursor:"pointer",fontWeight:700,color:C.muted,fontSize:13}},"Napravi ponovo"))),
      h("button",{onClick:onClose,style:{width:"100%",marginTop:12,padding:"10px 0",borderRadius:10,border:`1px solid ${C.border}`,background:"#fff",cursor:"pointer",fontWeight:700,color:C.muted,fontSize:14}},"Zatvori")));
}

// ── MENU MANAGER ──────────────────────────────────────────────────────────────
function MenuManager({menu,setMenu,onClose}){
  const[n,setN]=useState({name:"",price:"",category:"",type:"komadno"});
  const cats=[...new Set(menu.map(i=>i.category))];
  const add=async()=>{
    if(!n.name||!n.price)return;
    const item={id:Date.now().toString(),name:n.name,price:Number(n.price),category:n.category||"Ostalo",type:n.type};
    const u=[...menu,item];setMenu(u);await fbSaveMenu(u);setN({name:"",price:"",category:"",type:"komadno"});
  };
  const remove=async id=>{const u=menu.filter(i=>i.id!==id);setMenu(u);await fbSaveMenu(u);};
  const updPrice=async(id,p)=>{const u=menu.map(i=>i.id===id?{...i,price:Number(p)||0}:i);setMenu(u);await fbSaveMenu(u);};
  return h("div",{style:{position:"fixed",inset:0,background:"#0008",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{background:C.surface,borderRadius:18,padding:26,width:"min(640px,96vw)",maxHeight:"90vh",overflowY:"auto",boxShadow:`0 20px 60px ${C.shadow}`}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
        h("h2",{style:{margin:0,fontSize:19,color:C.crimson,fontFamily:FS}},"🍽 Meni"),
        h("button",{onClick:onClose,style:{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.muted}},"✕")),
      h("div",{style:{background:C.pinkLt,border:`1px solid ${C.border}`,borderRadius:12,padding:15,marginBottom:20}},
        h("div",{style:{fontSize:11,fontWeight:700,color:C.crimson,textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}},"Dodaj artikal"),
        h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8,marginBottom:8}},
          h("input",{placeholder:"Naziv",value:n.name,onChange:e=>setN(p=>({...p,name:e.target.value})),style:iSt()}),
          h("input",{placeholder:"Cena RSD",type:"number",value:n.price,onChange:e=>setN(p=>({...p,price:e.target.value})),style:iSt()})),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
          h("input",{placeholder:"Kategorija",value:n.category,onChange:e=>setN(p=>({...p,category:e.target.value})),list:"mcats",style:iSt()}),
          h("datalist",{id:"mcats"},cats.map(c=>h("option",{key:c,value:c}))),
          h("div",{style:{display:"flex",gap:6}},["komadno","kilogramski"].map(t=>
            h("button",{key:t,onClick:()=>setN(p=>({...p,type:t})),style:{flex:1,padding:"7px 4px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:11,border:`2px solid ${n.type===t?C.crimson:C.border}`,background:n.type===t?C.crimsonLt:C.surface,color:n.type===t?C.crimson:C.muted}},
              t==="komadno"?"📦 Komad":"⚖️ /kg")))),
        h("button",{onClick:add,style:{padding:"8px 20px",borderRadius:8,border:"none",background:C.crimson,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}},"+ Dodaj")),
      cats.map(cat=>h("div",{key:cat,style:{marginBottom:14}},
        h("div",{style:{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}},cat),
        menu.filter(i=>i.category===cat).map(item=>
          h("div",{key:item.id,style:{display:"flex",alignItems:"center",gap:8,padding:"7px 4px",borderBottom:`1px solid ${C.border}`}},
            h("span",{style:{flex:1,fontSize:14}},item.name),
            h("span",{style:{fontSize:11,padding:"2px 7px",borderRadius:10,fontWeight:700,background:item.type==="kilogramski"?"#E8F5E9":"#EEF",color:item.type==="kilogramski"?C.green:"#556"}},item.type==="kilogramski"?"⚖️/kg":"📦"),
            h("input",{type:"number",value:item.price,onChange:e=>updPrice(item.id,e.target.value),style:iSt({width:90,textAlign:"right",fontWeight:700,color:C.crimson})}),
            h("span",{style:{fontSize:12,color:C.muted}},item.type==="kilogramski"?"RSD/kg":"RSD"),
            h("button",{onClick:()=>remove(item.id),style:{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:16}},"✕")))))));
}

// ── KASA ──────────────────────────────────────────────────────────────────────
function Kasa({menu,cart,setCart}){
  const cats=[...new Set(menu.map(i=>i.category))];
  const[activeCat,setActiveCat]=useState(cats[0]||"Sve");
  const safeC=safeCart(cart);
  const addItem=item=>{const ex=safeC.find(c=>c.id===item.id);if(ex)setCart(safeC.map(c=>c.id===item.id?{...c,qty:c.qty+1}:c));else setCart([...safeC,{...item,qty:1,grams:item.type==="kilogramski"?1000:null}]);};
  const changeQty=(id,delta)=>setCart(safeC.map(c=>c.id===id?{...c,qty:Math.max(0,c.qty+delta)}:c).filter(c=>c.qty>0));
  const changeGrams=(id,g)=>setCart(safeC.map(c=>c.id===id?{...c,grams:Number(g)||0}:c));
  const shown=menu.filter(i=>activeCat==="Sve"||i.category===activeCat);
  return h("div",{style:{border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",background:C.pinkLt}},
    h("div",{style:{display:"flex",background:C.pinkMd,overflowX:"auto"}},
      ["Sve",...cats].map(cat=>h("button",{key:cat,onClick:()=>setActiveCat(cat),style:{padding:"8px 13px",border:"none",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:".4px",background:activeCat===cat?C.crimson:"transparent",color:activeCat===cat?"#fff":C.muted}},cat))),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(128px,1fr))",gap:8,padding:10}},
      shown.map(item=>{const inC=safeC.find(c=>c.id===item.id);return h("button",{key:item.id,onClick:()=>addItem(item),style:{padding:"10px 8px",borderRadius:10,cursor:"pointer",textAlign:"left",border:`2px solid ${inC?C.crimson:C.border}`,background:inC?C.crimsonLt:C.surface,transition:"all .1s"}},
        h("div",{style:{fontSize:12,fontWeight:700,color:inC?C.crimson:C.text,lineHeight:1.3}},item.name),
        h("div",{style:{fontSize:11,color:C.muted,marginTop:2}},item.price.toLocaleString("sr-RS")+" RSD"+(item.type==="kilogramski"?"/kg":"")),
        inC&&h("div",{style:{fontSize:10,color:C.green,fontWeight:700,marginTop:2}},"✓ "+inC.qty+"x"));})),
    safeC.length>0&&h("div",{style:{padding:"10px 13px",background:C.crimsonLt,borderTop:`1px solid ${C.border}`}},
      h("div",{style:{fontSize:11,fontWeight:700,color:C.crimson,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}},"Korpa"),
      safeC.map(c=>{const lp=linePrice(c,c.qty,c.grams);return h("div",{key:c.id,style:{marginBottom:8,paddingBottom:8,borderBottom:`1px dashed ${C.border}`}},
        h("div",{style:{display:"flex",alignItems:"center",gap:6}},
          h("span",{style:{flex:1,fontSize:13,fontWeight:700}},c.name),
          h("button",{onClick:()=>changeQty(c.id,-1),style:{width:26,height:26,borderRadius:7,border:`1px solid ${C.border}`,background:C.surface,cursor:"pointer",fontSize:15,color:C.crimson,fontWeight:700,padding:0}},"−"),
          h("span",{style:{width:22,textAlign:"center",fontWeight:700,fontSize:14}},c.qty),
          h("button",{onClick:()=>changeQty(c.id,1),style:{width:26,height:26,borderRadius:7,border:`1px solid ${C.border}`,background:C.surface,cursor:"pointer",fontSize:15,color:C.crimson,fontWeight:700,padding:0}},"+"),
          h("span",{style:{width:82,textAlign:"right",fontWeight:800,fontSize:13,color:C.crimson}},lp.toLocaleString("sr-RS")+" RSD")),
        c.type==="kilogramski"&&h("div",{style:{display:"flex",alignItems:"center",gap:6,marginTop:5,paddingLeft:4}},
          h("span",{style:{fontSize:11,color:C.muted}},"⚖️"),
          h("input",{type:"number",value:c.grams||"",placeholder:"1000",onChange:ev=>changeGrams(c.id,ev.target.value),style:{width:75,padding:"4px 7px",border:`1px solid ${C.border}`,borderRadius:6,fontSize:13,fontWeight:700,color:C.crimson,textAlign:"right"}}),
          h("span",{style:{fontSize:11,color:C.muted}},"g"),
          h("span",{style:{fontSize:11,color:C.green}},"= "+((Number(c.grams)||1000)/1000).toFixed(2)+" kg × "+c.price+" = "+lp.toLocaleString("sr-RS")+" RSD")));}))));
}

// ── ORDER FORM ────────────────────────────────────────────────────────────────
function OrderForm({date,onSave,onCancel,existing,menu}){
  const[ime,setIme]=useState(existing?.ime||"");
  const[prezime,setPrezime]=useState(existing?.prezime||"");
  const[telefon,setTelefon]=useState(existing?.telefon||"");
  const[kanal,setKanal]=useState(existing?.kanal||"Telefon");
  const[vreme,setVreme]=useState(existing?.vreme||"12:00");
  const[cart,setCart]=useState(()=>safeCart(existing?.cart));
  const[izmene,setIzmene]=useState(existing?.izmene||"");
  const[dostava,setDostava]=useState(existing?.dostava!==false);
  const[adresa,setAdresa]=useState(existing?.adresa||"");
  const[napomene,setNapomene]=useState(existing?.napomene||"");
  const safeC=safeCart(cart);
  const ukupno=safeC.reduce((s,c)=>s+linePrice(c,c.qty,c.grams),0);
  const handleSave=()=>{
    if(!ime.trim()){alert("Unesite ime!");return;}
    if(!telefon.trim()){alert("Unesite telefon!");return;}
    if(safeC.length===0){alert("Dodajte bar jedan artikal!");return;}
    const porudzbina=safeC.map(c=>c.type==="kilogramski"?`${c.qty}x ${c.name} (${c.grams||1000}g)`:`${c.qty}x ${c.name}`).join(", ");
    onSave({id:existing?.id||Date.now().toString(),datum:existing?.datum||date,ime,prezime,telefon,kanal,vreme,status:existing?.status||"Nova",cart:safeC,izmene,dostava,adresa,napomene,ukupno,porudzbina,preuzeta:existing?.preuzeta||false,otkazana:existing?.otkazana||false});
  };
  const lbl=(txt,req)=>h("label",{style:{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}},txt,req&&h("span",{style:{color:C.crimson}}," *"));
  const kanalIcons={Telefon:"📞",Viber:"💜",WhatsApp:"💬",Instagram:"📸"};
  return h("div",{style:{position:"fixed",inset:0,background:"#0009",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}},
    h("div",{style:{background:C.surface,borderRadius:18,padding:24,width:"min(660px,97vw)",maxHeight:"94vh",overflowY:"auto",boxShadow:`0 20px 60px ${C.shadow}`}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},

// ── MONTHLY VIEW ──────────────────────────────────────────────────────────────
function MonthlyView({orders,year,month,onSelectDay}){
  const today=new Date();
  const first=new Date(year,month,1).getDay();
  const offset=first===0?6:first-1;
  const dim=new Date(year,month+1,0).getDate();
  const cells=Array(offset).fill(null).concat(Array.from({length:dim},(_,i)=>i+1));
  while(cells.length%7)cells.push(null);
  const mo=orders.filter(o=>{const d=new Date(o.datum);return d.getFullYear()===year&&d.getMonth()===month;});
  const total=mo.reduce((s,o)=>s+Number(o.ukupno||0),0);
  const preuzete=mo.filter(o=>o.preuzeta).length;
  const todayStr=dKey(today.getFullYear(),today.getMonth(),today.getDate());
  const dOrd=d=>[...orders.filter(o=>o.datum===dKey(year,month,d))].sort((a,b)=>a.vreme.localeCompare(b.vreme));
  const isToday=d=>dKey(year,month,d)===todayStr;
  return h("div",null,
    h("div",{style:{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}},
      [{l:"Porudžbine",v:mo.length,c:C.crimson},{l:"Ukupan prihod",v:total.toLocaleString("sr-RS")+" RSD",c:C.crimson},{l:"Preuzeto",v:preuzete+" / "+mo.length,c:C.green}].map(s=>
        h("div",{key:s.l,style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"9px 14px",flex:"1 1 110px"}},
          h("div",{style:{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".5px"}},s.l),
          h("div",{style:{fontSize:18,fontWeight:900,color:s.c,marginTop:2,fontFamily:FS}},s.v)))),
    h("div",{style:{background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden",boxShadow:`0 4px 20px ${C.shadow}`}},
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.crimson}},
        DAYS.map(d=>h("div",{key:d,style:{padding:"10px 0",textAlign:"center",fontSize:12,fontWeight:700,color:"#fff",letterSpacing:".5px"}},d))),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}},
        cells.map((d,i)=>{
          const dO=d?dOrd(d):[];
          const allDone=dO.length>0&&dO.every(o=>o.preuzeta);
          const todayMark=d&&isToday(d);
          const colIndex=i%7;
          const isLastRow=i>=cells.length-7;
          return h("div",{key:i,onClick:()=>d&&onSelectDay(d),style:{minHeight:120,padding:"6px 5px",borderRight:colIndex<6?`1px solid ${C.border}`:"none",borderBottom:!isLastRow?`1px solid ${C.border}`:"none",cursor:d?"pointer":"default",background:d?(allDone?"#F0FFF4":C.surface):C.bg,overflow:"hidden",minWidth:0}},
            d&&h(Fragment,null,
              h("div",{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:"50%",marginBottom:4,background:todayMark?C.crimson:"transparent",color:todayMark?"#fff":dO.length?C.crimson:C.muted,fontWeight:todayMark||dO.length?800:400,fontSize:13}},d),
              dO.slice(0,3).map(o=>h("div",{key:o.id,style:{background:o.otkazana?"#f5f5f5":o.preuzeta?"#E8F5E9":C.crimsonLt,border:`1px solid ${o.otkazana?"#ddd":o.preuzeta?"#A5D6A7":C.pink}`,borderRadius:5,padding:"2px 4px",marginBottom:3,fontSize:9,fontWeight:700,color:o.otkazana?"#bbb":o.preuzeta?C.green:C.crimson,textDecoration:o.otkazana||o.preuzeta?"line-through":"none",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.5,display:"block",maxWidth:"100%",boxSizing:"border-box"}},o.vreme+" "+o.ime)),
              dO.length>3&&h("div",{style:{fontSize:10,color:C.muted,fontWeight:700,paddingLeft:2}},"+"+( dO.length-3)+" više")));
        }))));
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const today=new Date();

  const[editOrder,setEditOrder]=useState(null);
  const[showMenu,setShowMenu]=useState(false);
  const[showPrint,setShowPrint]=useState(false);
  const[syncing,setSyncing]=useState(false);

  useEffect(()=>{
    // Load menu from Firebase
    fbLoadMenu().then(m=>setMenu(m));
    // Realtime listener for orders
    const unsub=onSnapshot(ordersCol,snap=>{
      setOrders(snap.docs.map(d=>d.data()));
      setSyncing(false);
    },err=>console.error(err));
    return unsub;
  },[]);

  const handleSave=useCallback(async order=>{

    setSyncing(true);await fbSaveOrder({...o,preuzeta:!o.preuzeta,otkazana:false});
  },[orders]);

    const o=orders.find(x=>x.id===id);if(!o)return;

  },[orders]);

      h("div",{style:{display:"flex",alignItems:"center",gap:7,marginLeft:"auto"}},

          h("span",{style:{color:"#fff",fontWeight:700,minWidth:124,textAlign:"center",fontSize:13}},title),

      view==="month"&&h(MonthlyView,{orders,year,month,onSelectDay:d=>{setSelDate(dKey(year,month,d));setView("day");}}),
      view==="day"&&h(DailyView,{orders,date:selDate,onAdd:()=>openAdd(selDate),onEdit:openEdit,onDelete:handleDelete,onTogglePreuzeta:handleTogglePreuzeta,onToggleOtkazana:handleToggleOtkazana,onPrint:()=>setShowPrint(true)})),
    form&&h(OrderForm,{date:form.date,existing:form.existing,menu,onSave:handleSave,onCancel:()=>{setForm(null);setEditOrder(null);}}),
    showMenu&&h(MenuManager,{menu,setMenu,onClose:()=>setShowMenu(false)}),
    showPrint&&h(PrintDay,{orders,date:selDate,onClose:()=>setShowPrint(false)}));
}

createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
